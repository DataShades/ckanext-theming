    category: essential
    arguments:
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        value:
            description: Value to include in the form submission
            type: 'str'

input:
    description: |
        Generic input element, used to show a single-line text input in a form.
    category: essential
    arguments:
        content:
            description: Help text for the input
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        id:
            description: Unique identifier for the input, used to associate it with a label
            type: 'str'
        label:
            description: Label text shown next to the file input
            type: 'str'
        value:
            description: Default value of the input
            type: 'str'
        required:
            description: Whether this field is required to submit the form
            type: 'bool'
        placeholder:
            description: Placeholder text shown in the input when it is empty
            type: 'str'
        type:
            description: Type of the input, either "text", "email", "password", "number", etc.
            type: 'str'
        errors:
            description: List of error messages to show for this field
            type: 'list[str]'

markdown:
    description: |
        Markdown input element, used to show a multi-line text input for
