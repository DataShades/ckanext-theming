    category: essential
    arguments:
        content:
            description: Help text for the input
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        id:
            description: Unique identifier for the input, used to associate it with a label
            type: 'str'
        label:
            description: Label text shown next to the file input
            type: 'str'
        value:
            description: Default value of the input
            type: 'str'
        placeholder:
            description: Placeholder text shown in the input when it is empty
            type: 'str'
        required:
            description: Whether this field is required to submit the form
            type: 'bool'
        errors:
            description: List of error messages to show for this field
            type: 'list[str]'

radio:
    description: |
        Radio button input element, used to show a single option in a group of mutually exclusive options in a form.
    category: essential
    arguments:
        content:
            description: Help text for the input
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        id:
            description: Unique identifier for the input, used to associate it with a label
            type: 'str'
        label:
            description: Label text shown next to the radiobox
            type: 'str'
        required:
            description: Whether this field is required to submit the form
            type: 'bool'
        value:
            description: Value submitted when the checkbox is checked
            type: 'str'
        errors:
            description: List of error messages to show for this field
            type: 'list[str]'
        checked:
            description: Whether the checkbox is checked by default
            type: 'bool'

range_input:
    description: |
        Range input element, used to show a slider input for selecting a numeric value within a range in a form.
    category: recommended
    arguments:
        content:
            description: Help text for the input
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        id:
            description: Unique identifier for the input, used to associate it with a label
            type: 'str'
        label:
            description: Label text shown next to the file input
            type: 'str'
        value:
            description: Default value of the input
            type: 'str'
        required:
            description: Whether this field is required to submit the form
            type: 'bool'
        errors:
            description: List of error messages to show for this field
            type: 'list[str]'
        min_value:
            description: Minimum value allowed for the input
            type: 'int'
        max_value:
            description: Maximum value allowed for the input
            type: 'int'
        step:
            description: Step size for the input value
            type: 'int'

select:
    description: |
        Select input element, used to show a dropdown select input for selecting one or more options in a form.
    category: essential
    arguments:
        content:
            description: Help text for the input
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        id:
            description: Unique identifier for the input, used to associate it with a label
            type: 'str'
        label:
            description: Label text shown next to the file input
            type: 'str'
        multiple:
            description: Whether to allow selecting multiple options
            type: 'bool'
        required:
            description: Whether this field is required to submit the form
            type: 'bool'
        errors:
            description: List of error messages to show for this field
            type: 'list[str]'
        selected:
            description: List of values of the options that should be selected by default
            type: 'list[str]'
        options:
            description: List of options to show in the select box, each option is a dictionary with "label" and "value"
            type: 'list[dict]'

select_box:
    description: |
        Wrapper around list of select options, used to show a dropdown select input in a form.
    category: essential
    arguments:
        content:
            description: Select options to show in the select box, typically a list of select_option elements
        nested_content:
            description: Help text for the input
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        id:
            description: Unique identifier for the input, used to associate it with a label
            type: 'str'
        label:
            description: Label text shown next to the file input
            type: 'str'
        multiple:
            description: Whether to allow selecting multiple options
            type: 'bool'
        required:
            description: Whether this field is required to submit the form
            type: 'bool'
        errors:
            description: List of error messages to show for this field
            type: 'list[str]'

select_option:
    description: |
        Single option in a select input element, used to show an option in a dropdown select box.
    category: essential
    arguments:
        content:
            description: Option label shown to the user
        value:
            description: Value submitted when this option is selected
            type: 'str'
        selected:
            description: Whether this option is selected by default
            type: 'bool'

textarea:
    description: |
        Textarea input element, used to show a multi-line text input in a form.
    category: essential
    arguments:
        content:
            description: Help text for the input
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        id:
            description: Unique identifier for the input, used to associate it with a label
            type: 'str'
        label:
            description: Label text shown next to the file input
            type: 'str'
        value:
            description: Default value of the input
            type: 'str'
        placeholder:
            description: Placeholder text shown in the input when it is empty
            type: 'str'
        required:
            description: Whether this field is required to submit the form
            type: 'bool'
        errors:
            description: List of error messages to show for this field
            type: 'list[str]'


autocomplete:
    description: |
        Autocomplete input element, used to show a text input with autocomplete
        suggestions in a form.
    category: experimental
    arguments:
        content:
            description: Help text for the input
        name:
            description: Name of the form field, used as the key when submitting the form
            type: 'str'
        id:
            description: Unique identifier for the input, used to associate it with a label
            type: 'str'
        label:
            description: Label text shown next to the file input
            type: 'str'
        placeholder:
            description: Placeholder text shown in the input when it is empty
            type: 'str'
        required:
            description: Whether this field is required to submit the form
            type: 'bool'
        errors:
            description: List of error messages to show for this field
            type: 'list[str]'
        source:
            description: >-
                Optional source of the autocomplete suggestions. Must be a URL
                to fetch options from for ajax suggestions
            type: 'str'
        options:
            description: >-
                List of autocomplete suggestions, each suggestion is a
                dictionary with text" and "value". Used when source is missing.
            type: 'list[dict]'
        allow_multiple:
            description: Whether to allow selecting multiple options
            type: 'bool'
        allow_new:
            description: Whether to allow creating new options that are not in the suggestions list
            type: 'bool'
        selected:
            description: >-
                List of values of the options that should be selected by
                default. Can be a list of strings or a list of dictionaries
                with "value" and "label" keys.
            type: 'list[str]|list[dict]'
        min_chars:
            description: >-
                Minimum number of characters the user must type before the
                autocomplete suggestions are fetched from the server when
                source is specified.
            type: 'int'
        debounce:
            description: >-
                Debounce delay in milliseconds for fetching autocomplete
                suggestions from the server when source is specified.
            type: 'int'
        joined:
            description: >-
                Whether to submit the selected options as a list of values or
                join values using separator.
            type: 'bool'
        separator:
            description: Separator character to use for single-string form(joined=true)
            type: 'str'
        id_key:
            description: >-
                Key to use from the suggestion dictionaries for the option values
                when source is specified.
            type: 'str'
        label_key:
            description: >-
                Key to use from the suggestion dictionaries for the option labels
                when source is specified.
            type: 'str'

# handles
modal_close_handle:
    description: Element used to trigger closing of a modal dialog, typically rendered as a close button in the modal header or footer.
    category: recommended
    arguments:
        content:
            description: Label or icon for the close handle
        id:
            description: Unique identifier of the modal to close when this handle is triggered
            type: 'str'

modal_handle:
    description: Element used to trigger opening of a modal dialog, typically rendered as a button or link that the user can click to open the modal.
    category: essential
    arguments:
        content:
            description: Label or icon for the handle
        id:
            description: Unique identifier of the modal to show when this handle is triggered
            type: 'str'

popover_handle:
    description: Element used to trigger showing of a popover, typically rendered as a button or link that the user can click to show the popover.
    category: recommended
    arguments:
        content:
            description: Label or icon for the handle
        id:
            description: Unique identifier of the popover to toggle when this handle is triggered
            type: 'str'

# # meta
account:
    description: Wrapper element for account-related links or information, typically shown in the page header.
    category: recommended
    arguments:
        content:
            description: Account-related content, typically links to user profile, settings, logout, etc.

header:
    description: Wrapper element for the page header, typically containing the site logo and main navigation.
    category: recommended
    arguments:
        content:
            description: Header content, typically main navigation
        title:
            description: Site title
            type: 'str'
        subtitle:
            description: Site subtitle or tagline
            type: 'str'
        logo:
            description: URL of the site logo image
            type: 'str'
        href:
            description: URL to navigate to when the header or logo is clicked, typically the site home page
            type: 'str'

footer:
    description: Wrapper element for the page footer, typically containing copyright information and links to legal and support pages.
    category: recommended
    arguments:
        content:
            description: Footer content, typically copyright information and links to legal and support pages

footer_main:
    description: Main content element for the page footer, typically containing copyright information and links to legal and support pages.
    category: recommended
    arguments:
        content:
            description: Main footer content, typically copyright information and links to legal and support pages

footer_secondary:
    description: Secondary content element for the page footer, typically containing additional links or information.
    category: recommended
    arguments:
        content:
            description: Secondary footer content, typically additional links or information

subtitle_item:
    description: Fragment of the page title rendered inside `<head>` tag.
    category: essential
    arguments:
        content:
            description: Fragment of the title
        initial:
            description: Whether this is the initial part of the title
            type: 'bool'

# navigation
breadcrumb:
    description: |
        Breadcrumb navigation element, used to show the user's current location
        within the site hierarchy and allow navigation back to parent pages.
    category: essential
    arguments:
        content:
            description: Breadcrumb label
        href:
            description: URL to navigate to when the breadcrumb item is clicked
            type: 'str'
        initial:
            description: Whether this is the initial breadcrumb item, typically the home page
            type: 'bool'
        active:
            description: Whether this breadcrumb item represents the current page
            type: 'bool'

nav_item:
    description: |
        Generic navigation item, used to show a link in a navigation menu.
    category: essential
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'
        active:
            description: Whether this navigation item represents the current page
            type: 'bool'

main_nav_item:
    description: |
        Navigation item for the main navigation menu in the page header.
    category: essential
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'
        active:
            description: Whether this navigation item represents the current page
            type: 'bool'

footer_main_nav_item:
    description: |
        Navigation item for the main navigation menu in the page footer.
    category: essential
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'

footer_secondary_nav_item:
    description: |
        Navigation item for the main navigation menu in the secondary page footer.
    category: essential
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'

sidebar_nav_item:
    description: |
        Navigation item for the sidebar navigation menu, typically shown on the left or right side of the page.
    category: recommended
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'
        active:
            description: Whether this navigation item represents the current page
            type: 'bool'

account_nav_item:
    description: |
        Navigation item for the account menu, typically shown in the page
        header and containing links to user profile, settings, logout, etc.
    category: essential
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'
        active:
            description: Whether this navigation item represents the current page
            type: 'bool'

content_nav_item:
    description: |
        Navigation item for the content menu, typically shown as a secondary
        navigation within a page, for example to switch between different
        sections of a dataset page.
    category: essential
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'
        active:
            description: Whether this navigation item represents the current page
            type: 'bool'

page_action:
    description: |
        Navigation item for page actions, typically shown as buttons or links
        for actions related to the current page, for example "Add a dataset".
    category: essential
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'

content_action:
    description: |
        Navigation item for content actions, typically shown as buttons or links
        for actions related to the current content, for example "Download",
        "Edit", etc.
    category: essential
    arguments:
        content:
            description: Navigation item label
        href:
            description: URL to navigate to when the navigation item is clicked
            type: 'str'

pagination:
    description: |
        Pagination element, used to show pagination controls for paginated
        content, typically rendered as a list of page numbers and next/previous
        buttons.
    category: essential
    arguments:
        page:
            description: Current page number
            type: 'int'
        total:
            description: Total number of pages
            type: 'int'
        url_generator:
            description: Function that generates a URL for a given page number, used to create links for the pagination controls
            type: 'callable'
        padding:
            description: Number of page links to show on each side of the current page
            type: 'int'
        hide_edges:
            description: Whether to hide the "first" and "last" page links
            type: 'bool'
        hide_siblings:
            description: Whether to hide the "next" and "previous" page links
            type: 'bool'
        start_label:
            description: Label for the "first" page link
            type: 'str'
        end_label:
            description: Label for the "last" page link
            type: 'str'
        previous_label:
            description: Label for the "previous" page link
            type: 'str'
        next_label:
            description: Label for the "next" page link
            type: 'str'
        padding_label:
            description: Label for the padding links (e.g. "...")
            type: 'str'
        url_params:
            description: Additional URL parameters to include in the generated URLs for the pagination links
            type: 'dict[str, str]'

pagination_item:
    description: |
        Single page item in a pagination element, typically rendered as a link or button for a specific page number.
    category: essential
    arguments:
        content:
            description: Page number or label for the pagination item
        href:
            description: URL to navigate to when the pagination item is clicked
            type: 'str'
        active:
            description: Whether this pagination item represents the current page
            type: 'bool'

dropdown_item:
    description: |
        Single item in a dropdown menu, typically rendered as a link or button within a dropdown.
    category: essential
    arguments:
        content:
            description: Dropdown item label
        href:
            description: URL to navigate to when the dropdown item is clicked
            type: 'str'


# search
search_active_filters:
    description: |
        Element used to show the currently active search filters, typically
        rendered as a list of filter labels with options to remove each filter.
    category: recommended
    arguments:
        active_filters:
            description: List of currently active filters
            type: 'list[tuple[str, str]]'
        facet_titles:
            description: Mapping of facet names to their display titles, used to show user-friendly filter labels
            type: 'dict[str, str]'
        facets:
            description: List of available facets, used to show user-friendly filter labels
            type: 'list[dict]'
        use_htmx:
            description: Whether to use HTMX for the filter links, which allows for dynamic updating of search results without a full page reload
            type: 'bool'

search_advanced_controls:
    description: |
        Element used to show advanced search controls, typically rendered as a
        collapsible section with additional search options and filters.
    category: experimental
    arguments:
        content:
            description: Usually ignored

search_form:
    description: Complete search form
    category: essential
    arguments:
        content:
            description: >-
                Usually ignored, as the search form is typically rendered in a
                single part in the template, but can be used when the search
                form is split into multiple parts.
        query:
            description: Current search query, used to populate the search input value
            type: 'str'
        sorting_options:
            description: List of available sorting options
            type: 'list[tuple[str, str]]'
        sorting:
            description: Currently selected sorting option, used to set the value of the search_sort_control element
            type: 'str'
        error:
            description: Search error message to show, typically shown when there is an error with the search query or filters
            type: 'str'
        count:
            description: Total number of search results, used to show the number of results found
            type: 'int'
        facets:
            description: List of available search facets, used to show the available filters and their counts
            type: 'list[dict]'
        facet_titles:
            description: Mapping of facet names to their display titles, used to show user-friendly filter labels
            type: 'dict[str, str]'
        active_filters:
            description: List of currently active filters, used to show which filters are currently applied to the search
            type: 'list[tuple[str, str]]'
        use_htmx:
            description: Whether to use HTMX for the search form, which allows for dynamic updating of search results without a full page reload
            type: 'bool'
        query_name:
            description: Name of the search query parameter, used in the search input name and when generating URLs for pagination and sorting links
            type: 'str'
        sorting_name:
            description: Name of the sorting parameter, used in the search_sort_control name and when generating URLs for pagination and sorting links
            type: 'str'
        type:
            description: Type of the search, used to customize the search form for different types of content (e.g. datasets, organizations, etc.)
            type: 'str'



search_form_box:
    description: |
        Element used to wrap the search form, typically containing the search
        input and submit button, and possibly additional search options.
    category: recommended
    arguments:
        content:
            description: Search form content, typically including search_input and search_submit_button elements
        use_htmx:
            description: >-
                Whether to use HTMX for the search form, which allows for
                dynamic updating of search results without a full page reload
            type: 'bool'

search_input:
    description: |
        Search input element, typically rendered as a text input for entering the search query.
    category: recommended
    arguments:
        content:
            description: Help text for the search input
        name:
            description: Name of the search query parameter, used in the search input name and when generating URLs for pagination and sorting links
            type: 'str'
        value:
            description: Current search query, used to populate the search input value
            type: 'str'
        label:
            description: Label text shown next to the search input
            type: 'str'
        placeholder:
            description: Placeholder text shown in the search input when it is empty
            type: 'str'

search_results_text:
    description: |
        Element used to show the search results text, typically rendered above
        the search results list and showing the number of results found and the
        search query.
    category: recommended
    arguments:
        content:
            description: >-
                Usually ignored, as the search results text is typically
                generated dynamically based on the search query and results
                count, but can be used to customize the search results text.
        count:
            description: Total number of search results, used to show the number of results found
            type: 'int'
        error:
            description: Search error message to show, typically shown when there is an error with the search query or filters
            type: 'str'
        query:
            description: Current search query, used to show the search query in the results text
            type: 'str'
        type:
            description: >-
                Type of the search, used to customize the search results text
                for different types of content (e.g. datasets, organizations,
                etc.)
            type: 'str'

search_sort_control:
    description: |
        Element used to show the search sorting control, typically rendered as a
        dropdown select input for selecting the sorting option.
    category: recommended
    arguments:
        content:
            description: Help text for the sorting control
        name:
            description: >-
                Name of the sorting parameter, used in the search_sort_control
                name and when generating URLs for pagination and sorting links
            type: 'str'
        selected:
            description: Currently selected sorting option, used to set the value of the search_sort_control element
            type: 'str'
        options:
            description: List of available sorting options, each option is a tuple of (value, label)
            type: 'list[tuple[str, str]]'
        label:
            description: Label text shown next to the sorting control
            type: 'str'

search_submit_button:
    description: |
        Submit button for the search form, typically rendered as a button with a search icon.
    category: recommended
    arguments:
        content:
            description: Button label, typically ignored when using an icon for the button
