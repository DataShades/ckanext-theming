{%- macro table(content, striped=false, bordered=false, condensed=false, hover=false, caption=none) -%}
    <table {{ ui.util.attrs(kwargs, {"class": "table" ~ (" table-striped" if striped else "") ~ (" table-bordered" if bordered else "") ~ (" table-condensed" if condensed else "") ~ (" table-hover" if hover else "")}) }}>
        {%- if caption -%}<caption>{{ caption }}</caption>{%- endif -%}
        {{ content }}
    </table>
{%- endmacro %}
