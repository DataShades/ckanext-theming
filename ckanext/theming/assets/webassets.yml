examples:
  filter: rjsmin
  extra:
    preload:
      - theming/examples-css
  output: ckanext-theming/%(version)s-examples.js
  contents:
      - examples.js

examples-css:
  output: ckanext-theming/%(version)s-examples.css
  contents:
      - examples.css


autocomplete-css:
  output: ckanext-theming/%(version)s-autocomplete.css
  contents:
      - autocomplete.css

autocomplete:
  output: ckanext-theming/%(version)s-autocomplete.js
  contents:
      - autocomplete.js
      # - autocomplete.select2.js
      # - autocomplete.tomselect.js
  extra:
      preload:
          # - vendor/vendor # used by select2 version
          - theming/autocomplete-css
