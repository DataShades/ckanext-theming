examples:
  filter: rjsmin
  extra:
    preload:
      - theming/examples-css
  output: ckanext-theming/%(version)s-examples.js
  contents:
      - examples.js

examples-css:
  output: ckanext-theming/%(version)s-examples.css
  contents:
      - examples.css

modules-css:
  output: ckanext-theming/%(version)s-modules.css
  contents:
      - autocomplete.css

modules:
  output: ckanext-theming/%(version)s-modules.js
  contents:
      - autocomplete.js
      - change-submit.js
  extra:
      preload:
          - theming/modules-css
