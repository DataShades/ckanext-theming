[project]
site_name = "ckanext-theming"
site_description = "Documentation for the CKAN theming extension"
site_author = "DataShades"
site_url = "https://datashades.github.io/ckanext-theming/"
repo_url = "https://github.com/DataShades/ckanext-theming"

nav = [
  "index.md",
  "philosophy.md",
  "styleguide.md",
  "migration.md",
  "recipes.md",
  { "Theme Development" = [
    "theme/basic.md",
    "theme/component-library.md",
    "theme/reliant-theme.md",
    "theme/combined-theme.md",
  ] },
  { "Role Guides" = [
    "roles/theme-developers.md",
    "roles/extension-developers.md",
    "roles/portal-maintainers.md",
  ] },
  "advanced.md",
  "best-practices.md",
  "cli.md",
  { "Component library" = [
    "library/index.md",
    "library/layout.md",
    "library/navigation.md",
    "library/content.md",
    "library/forms.md",
    "library/feedback.md",
    "library/elements.md",
    "library/data.md",
    "library/search.md",
    "library/structure.md",
  ] },
  "parameters.md",

]

#extra_css = ["stylesheets/extra.css"]
#extra_javascript = ["javascripts/extra.js"]

[project.theme]
# variant = "classic"
#custom_dir = "overrides"
favicon = "img/favicon.ico"

features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  # "navigation.sections",
  # "navigation.expand",

  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
  # "toc.integrate",
]

logo = "img/logo.png"

[[project.theme.palette]]
scheme = "default"
primary = "blue"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.blocks.admonition]
[project.markdown_extensions.pymdownx.blocks.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.zensical.extensions.macros]
module_name = "docs/main"
on_error_fail = true
j2_block_start_string = "<%"
j2_block_end_string = "%>"
j2_variable_start_string = "<<"
j2_variable_end_string = ">>"
j2_comment_start_string = "<#"
j2_comment_end_string = "#>"
